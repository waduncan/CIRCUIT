<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Purpose-built logical connectivity diagrams for healthcare systems."
    />
    <link rel="icon" href="/favicon.svg" />
    <title>CIRCUIT Studio</title>
    <script>
      // Apply the saved (or system) theme before first paint so there is no flash of the
      // wrong theme on load. Keep in sync with app/hooks/useTheme.ts (key + values).
      (function () {
        try {
          var stored = localStorage.getItem("circuit-theme");
          var theme = stored === "light" || stored === "dark"
            ? stored
            : (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
          document.documentElement.dataset.theme = theme;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
